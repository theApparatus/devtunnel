app = "frps-fixshifted"
primary_region = "iad"

[build]

[env]
  # FRP_AUTH_TOKEN set via: fly secrets set FRP_AUTH_TOKEN=<token>

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[services.tcp_checks]]
    interval = 15000
    grace_period = "10s"
    timeout = 3000

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
